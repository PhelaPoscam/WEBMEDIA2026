[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
skip = [".venv", "venv", ".env"]
known_first_party = ["src"]

[tool.black]
line-length = 100
target-version = ['py310', 'py311']
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | \.env
  | __pycache__
  | node_modules
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
